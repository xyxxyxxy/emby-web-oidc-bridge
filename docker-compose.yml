# Development docker-compose — for local testing only.
# Copy .env.example to .env and fill in your values.

services:
  emby-bridge:
    build: .
    environment:
      EMBY_API_URL: ${EMBY_API_URL}
      EMBY_API_KEY: ${EMBY_API_KEY}
      TEMPLATE_USER_NAME: ${TEMPLATE_USER_NAME:-template}
      TRUSTED_PROXIES: ${TRUSTED_PROXIES}
      DATABASE_PATH: /data/users.db
      # EMBY_WATCHPARTY_URL: http://emby-watchparty:5000
    volumes:
      - bridge-data:/data
    ports:
      - "8080:8080"

  # # Watchparty v2 — synchronized watch-together service (optional).
  # # Requires the 2.0-Rework branch of emby-watchparty.
  # # Uncomment this service and set EMBY_WATCHPARTY_URL above to enable.
  # emby-watchparty:
  #   image: ghcr.io/oratorian/emby-watchparty:2.0-Rework
  #   environment:
  #     APP_PREFIX: /watchparty
  #     # The bridge auto-fills the watchparty login form with the user's credentials.
  #     REQUIRE_LOGIN: "true"

volumes:
  bridge-data:
