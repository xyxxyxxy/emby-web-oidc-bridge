# Forward auth mode: Caddy authenticates via oauth2-proxy subrequest, then forwards to bridge.
# Profile image sync works via JWT ID token extraction (set_authorization_header in oauth2-proxy).
#
# Flow: Browser → Caddy → (auth check: oauth2-proxy) → bridge → Emby

services:
  caddy:
    image: caddy:2-alpine
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - oauth2-proxy
      - emby-bridge
    restart: unless-stopped

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
    command:
      - --config=/etc/oauth2-proxy/oauth2-proxy.cfg
    volumes:
      - ./oauth2-proxy.cfg:/etc/oauth2-proxy/oauth2-proxy.cfg:ro
    restart: unless-stopped

  emby-bridge:
    image: ghcr.io/xyxxyxxy/emby-web-oidc-bridge:latest
    environment:
      # URL of your Emby server's API endpoint
      EMBY_API_URL: http://emby:8096/emby
      # Admin API key from Emby (Dashboard → API Keys)
      EMBY_API_KEY: your-emby-api-key
      # Name of the Emby user whose settings are copied to new users
      TEMPLATE_USER_NAME: template
      # Allow requests from Caddy's container IP range
      TRUSTED_PROXIES: "172.18.0.0/16"
      # OIDC issuer URL (enables profile image sync via userinfo or JWT)
      OIDC_ISSUER_URL: https://your-oidc-issuer.example.com
      # Port the bridge listens on (default: 8080)
      # BRIDGE_PORT: 8080
      # Path to the SQLite database file
      DATABASE_PATH: /data/users.db
    volumes:
      - bridge-data:/data
    read_only: true
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

volumes:
  bridge-data:
  caddy-data:
  caddy-config:
