# oauth2-proxy configuration for upstream mode
# Docs: https://oauth2-proxy.github.io/oauth2-proxy/configuration/overview

# --- OIDC Provider ---
# Replace with your OIDC provider details
provider = "oidc"
client_id = "your-client-id"
client_secret = "your-client-secret"
oidc_issuer_url = "https://your-oidc-issuer.example.com"

# --- Upstream ---
# Forward authenticated requests to the bridge
upstreams = ["http://emby-bridge:8080"]

# Pass identity headers to the upstream
pass_user_headers = true

# Forward the access token (enables userinfo lookup for profile image)
pass_access_token = true

# Forward the ID token as Authorization header (enables sub/name/picture extraction from JWT)
set_authorization_header = true

# --- Listener ---
http_address = "0.0.0.0:4180"

# --- Cookie ---
# Generate a secret: python3 -c 'import os,base64; print(base64.urlsafe_b64encode(os.urandom(32)).decode())'
cookie_secret = "your-cookie-secret-base64"
cookie_secure = true
cookie_name = "_oauth2_proxy"

# --- Email / Access ---
# Allow all authenticated users (restrict via your OIDC provider instead)
email_domains = ["*"]

# --- Redirect ---
redirect_url = "https://emby.example.com/oauth2/callback"

# --- Optional: request the picture claim ---
# Most providers include it by default; add "profile" scope if needed
scope = "openid email profile"

# =============================================================================
# Optional: shared SSO across multiple subdomains (uncomment and adapt)
# =============================================================================
#
# Use when one oauth2-proxy protects several hosts (emby.example.com, docs.example.com, …).
#
# cookie_name = "__Secure-oauth2_proxy"   # __Secure- allows a parent Domain; __Host- is per-host only
# cookie_samesite = "lax"
# cookie_domains = [".example.com"]       # leading dot — NOT "*.example.com" (invalid for cookies)
#
# whitelist_domains = [".example.com", "auth.example.com"]
#   .example.com  — post-logout return to any protected subdomain
#   auth.example.com — IdP end-session URL in sign_out rd= chain (adjust to your issuer host)
#
# After changing cookie name or domain: delete old oauth2-proxy cookies once, then log in again.
